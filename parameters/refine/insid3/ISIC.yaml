grid: RefineINSID3ISIC
parameters:
  test:
    prompt_to_use: [null]
  dataloader:
    num_workers: [0]
  dataset:
    preprocess:
      mean:
      - [0.485, 0.456, 0.406]
      std:
      - [0.229, 0.224, 0.225]
      image_size: [1024]
    datasets:
      test_isic:
        datapath: [data]
        prompt_images: [9, 15, 30, 60]
  tracker:
    project: [FSSWeed]
    group: [ISIC]
    log_frequency: [1]
    tags:
    - [ISIC, Refine, INSID3]
    tmp_dir: [tmp]
    cache_dir: [tmp]
    train_image_log_frequency: [25]
    test_image_log_frequency: [10]
    mode: [offline]
  model:
  - {name: insid3, differentiable: true, adapter: conv}
  refinement:
    lr: [0.001]
    max_iterations: [1000]
    hot_parameters:
    - [adapter]
    subsample: [3]
    substitutor: [paired]
    iterations_is_num_classes: [false]
    loss:
      name: [focal]
      gamma: [2]
