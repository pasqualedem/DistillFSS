grid: RefineRestNetWeedMap
parameters:
  test:
    prompt_to_use: [null]
  dataloader:
    num_workers: [0]
  dataset:
    preprocess:
      mean: [[0.485, 0.456, 0.406]]
      std: [[0.229, 0.224, 0.225]]
      image_size: [400]
    datasets:
      test_weedmap:
        train_root: [data/weedmap/0_rotations_processed_003_test/RedEdge/000]
        test_root: [data/weedmap/0_rotations_processed_003_test/RedEdge/003]
        # prompt_images: [5, 10, 25, 50]
        prompt_images: [5]
        remove_black_images: [false]
  tracker:
    project: [FSSWeed]
    group: [WeedMap]
    log_frequency: [1]
    tags: [[WeedMap, Refine, RestNet]]
    tmp_dir: [tmp]
    cache_dir: [tmp]
    train_image_log_frequency: [25]
    test_image_log_frequency: [10]
  model:
    name: [restnet]
    backbone: [resnet50]
    model_checkpoint: [checkpoints/restnet_fss1000-fold0-1shot.pt]
  refinement:
    lr: [1.e-4]
    max_iterations: [2500]
    validate_every: [50]
    hot_parameters:
      -
        - "hpn_learner.decoder1"
        - "hpn_learner.decoder2"
      -
        - "hpn_learner.decoder1"
        - "hpn_learner.decoder2"
        - "hpn_learner.encoder_layer4"
        - "hpn_learner.encoder_layer3"
        - "hpn_learner.encoder_layer2"
      -
        - "reference_layer1"
        - "reference_layer2"
        - "reference_layer3"
        - "hpn_learner.decoder1"
        - "hpn_learner.decoder2"
        - "hpn_learner.encoder_layer4"
        - "hpn_learner.encoder_layer3"
        - "hpn_learner.encoder_layer2"
    subsample: [1, 2]
    substitutor: [paired]
    iterations_is_num_classes: [false]
    loss:
      name: [focal]
      gamma: [2]
