grid: RefineRestNetWeedMap
parameters:
  test:
    prompt_to_use: [null]
  dataloader:
    num_workers: [0]
  dataset:
    preprocess:
      mean: [[0.485, 0.456, 0.406]]
      std: [[0.229, 0.224, 0.225]]
      image_size: [400]
    datasets:
      test_weedmap:
        train_root: [data/weedmap/0_rotations_processed_003_test/RedEdge/000]
        test_root: [data/weedmap/0_rotations_processed_003_test/RedEdge/003]
        # prompt_images: [5, 10, 25, 50]
        prompt_images: [5]
        remove_black_images: [false]
  tracker:
    project: [FSSWeed]
    group: [WeedMap]
    log_frequency: [1]
    tags: [[WeedMap, Refine, MSDNet]]
    tmp_dir: [tmp]
    cache_dir: [tmp]
    train_image_log_frequency: [25]
    test_image_log_frequency: [10]
  model:
    name: [msdnet]
    layers: [50]
    shot: [1]
    reduce_dim: [64]
    model_checkpoint: ["checkpoints/msdnet_pascal0_1s.pt"]
  refinement:
    lr: [1.e-3]
    max_iterations: [1000, 2000]
    hot_parameters:
      # - 
      #   - "adjust_feature_qry"
      #   - "adjust_feature_supp"
      #   - "adjust_feature_supp_for_decoder"
      #   - "init_merge"
      #   - "beta_conv"
      #   - "transformer"
      #   - "res1"
      #   # - "student"
      # - 
      #   - "init_merge"
      #   - "beta_conv"
      #   - "transformer"
      #   - "res1"
      -
    subsample: [1, 2]
    substitutor: [paired]
    iterations_is_num_classes: [false]
    loss:
      name: [focal]
      gamma: [2]
