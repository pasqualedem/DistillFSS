grid: RefineSegICWeedMapClassProj
parameters:
  test:
    prompt_to_use: [null]
  dataloader:
    num_workers: [0]
  dataset:
    preprocess:
      mean: [[0.485, 0.456, 0.406]]
      std: [[0.229, 0.224, 0.225]]
      image_size: [896] # dinov2: 14*64
    datasets:
      test_weedmap:
        train_root: [data/weedmap/0_rotations_processed_003_test/RedEdge/000]
        test_root: [data/weedmap/0_rotations_processed_003_test/RedEdge/003]
        prompt_images: [5]
        remove_black_images: [false]
  tracker:
    project: [FSSWeed]
    group: [WeedMap]
    log_frequency: [1]
    tags: [[WeedMap, Refine, SegIC, ClassProj]]
    tmp_dir: [tmp]
    cache_dir: [tmp]
    train_image_log_frequency: [25]
    test_image_log_frequency: [10]
  model:
    name: [segic]
    encoder_model: [dinov2]
    dinov2_model: [l]
    model_checkpoint: [checkpoints/segic/segic_dinov2_l_80kx12e.pth]
    use_cross_inst_prompt: [true]
    use_class_projectors: [true]
    num_classes: [2]
  refinement:
    lr: [1.e-4]
    max_iterations: [2500]
    hot_parameters:
      -
        - class_projectors
      -
        - class_projectors
        - neck
        - prompt_proj
        - inst_proj
      -
        - class_projectors
        - neck
        - prompt_proj
        - inst_proj
        - mask_decoder
    subsample: [1, 2]
    substitutor: [paired]
    iterations_is_num_classes: [false]
    loss:
      name: [focal]
      gamma: [2]
other_grids: null
