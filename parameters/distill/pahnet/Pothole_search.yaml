grid: DistillPAHNetPotholeSearch
parameters:
  test:
    prompt_to_use: [null]
  dataloader:
    num_workers: [0]
  dataset:
    preprocess:
      mean: [[0.485, 0.456, 0.406]]
      std: [[0.229, 0.224, 0.225]]
      image_size: [473] # PAHNet native size
    datasets:
      test_pothole:
        datapath: [data]
        prompt_images: [5]
  tracker:
    project: [FSSWeed]
    group: [Pothole]
    log_frequency: [1]
    tags: [[Pothole, Distill, PAHNet]]
    tmp_dir: [tmp]
    cache_dir: [tmp]
    train_image_log_frequency: [25]
    test_image_log_frequency: [10]
  model:
    name: [distillator]
    params:
      teacher:
        name: [pahnet]
        dataset: [coco]
        shots: [5]
        val_fold_idx: [0]
      student:
        name: [pahnet_distillator]
        num_classes: [1]
  refinement:
    validate_every: [50]
    lr: [1.e-4]
    weight_decay: [0.01, 0.001]
    max_iterations: [1000]
    hot_parameters:
      -
        - "student"
        - "teacher.init_merge_query"
        - "teacher.ASPP_meta"
        - "teacher.res1_meta"
        - "teacher.res2_meta"
        - "teacher.cls_meta"
        - "teacher.base_learner"
        - "teacher.gram_merge"
        - "teacher.cls_merge"
    subsample: [1, 2]
    substitutor: [null]
    iterations_is_num_classes: [false]
    loss:
      name: [refine_distill]
