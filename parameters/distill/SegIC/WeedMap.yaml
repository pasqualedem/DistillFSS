grid: DistillSegICWeedMap
parameters:
  test:
    prompt_to_use: [null]
  dataloader:
    num_workers: [0]
  dataset:
    preprocess:
      mean: [[0.485, 0.456, 0.406]]
      std: [[0.229, 0.224, 0.225]]
      image_size: [896]
    datasets:
      test_weedmap:
        train_root: [data/weedmap/0_rotations_processed_003_test/RedEdge/000]
        test_root: [data/weedmap/0_rotations_processed_003_test/RedEdge/003]
        prompt_images: [5, 10, 25, 50]
        remove_black_images: [false]
  tracker:
    project: [FSSWeed]
    group: [WeedMap]
    log_frequency: [1]
    tags: [[WeedMap, Distill, SegIC]]
    tmp_dir: [tmp]
    cache_dir: [tmp]
    train_image_log_frequency: [25]
    test_image_log_frequency: [10]
  model:
    name: [distillator]
    params:
      teacher:
        name: [segic]
        encoder_model: [dinov2]
        dinov2_model: [l]
        model_checkpoint: [checkpoints/segic/segic_dinov2_l_80kx12e.pth]
        use_cross_inst_prompt: [true]
      student:
        name: [segic_distillator]
        num_classes: [2]
  refinement:
    lr: [1.e-3]
    max_iterations: [500, 1000]
    hot_parameters:
      -
        - "student"
      -
        - "student"
        - "teacher.prompt_proj"
        - "teacher.inst_proj"
      -
        - "teacher.neck"
        - "teacher.prompt_proj"
        - "teacher.inst_proj"
        - "teacher.mask_decoder"
        - "student"
    subsample: [1]
    substitutor: [paired]
    iterations_is_num_classes: [false]
    loss:
      name: [refine_distill]
