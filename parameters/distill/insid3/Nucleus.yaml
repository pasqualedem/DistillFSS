grid: DistillINSID3Nucleus
parameters:
  test:
    prompt_to_use: [null] # How many prompt use in testing - null => all
  dataloader:
    num_workers: [0]
  dataset:
    preprocess:
      mean: [[0.485, 0.456, 0.406]]
      std: [[0.229, 0.224, 0.225]]
      image_size: &image_size [1024]
    datasets:
      test_nucleus:
        datapath: [data]
        prompt_images: 
          - 5
          # - 10
          # - 25
          # - 50
  tracker:
    project: [FSSWeed]
    group: [Nucleus]
    log_frequency: [1]
    tags: [[Nucleus, Distill]]
    tmp_dir: [tmp]
    train_image_log_frequency: [25]
    test_image_log_frequency: [10]
    mode: [offline]
  model:
    name: [distillator]
    params:
      teacher:
        -
          name: insid3
      student:
        name: [insid3_distillator]
        num_classes: [2]
  refinement:
    lr: [1.e-3]
    max_iterations: [500]
    hot_parameters:
      - 
        - "student"
    subsample: [1]
    substitutor: [null]
    iterations_is_num_classes: [false]
    loss:
      name: [refine_distill]

  