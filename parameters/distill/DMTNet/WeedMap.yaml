grid: DistillDMTNetWeedMap
parameters:
  device: [cuda:2]
  test:
    prompt_to_use: [null] # How many prompt use in testing - null => all
  dataloader:
    num_workers: [0]
  dataset:
    preprocess:
      mean: [[0.485, 0.456, 0.406]]
      std: [[0.229, 0.224, 0.225]]
      image_size: &image_size [400]
    datasets:
      test_weedmap:
        train_root: [data/weedmap/0_rotations_processed_003_test/RedEdge/000]
        test_root: [data/weedmap/0_rotations_processed_003_test/RedEdge/003]
        prompt_images:
          - 5
          # - 10
          # - 25
          # - 50
        # remove_black_images: [true]
  tracker:
    project: [FSSWeed]
    group: [WeedMap]
    log_frequency: [1]
    tags: [[WeedMap, Distill]]
    tmp_dir: [tmp]
    cache_dir: [tmp]
    train_image_log_frequency: [25]
    test_image_log_frequency: [10]
    # mode: [offline]
  model:
    name: [distillator]
    params:
      teacher:
          name: [dmtnet]
          backbone: [resnet50]
          model_checkpoint: [checkpoints/dmtnet.pt]
          voting: [false]
      student:
        name: [dmtnet_distillator]
        num_classes: [2]
        num_conv_layers: [2, 4, 8]
  refinement:
    lr: [1.e-3]
    max_iterations: [500, 2500]
    validate_every: [50]
    hot_parameters:
      # -
      #   - "hpn_learner.decoder1"
      #   - "hpn_learner.decoder2"
      #   - "student"
      - 
        - "hpn_learner.decoder1"
        - "hpn_learner.decoder2"
        - "hpn_learner.encoder_layer4"
        - "hpn_learner.encoder_layer3"
        - "hpn_learner.encoder_layer2"
        - "student"
      - 
        - "reference_layer"
        - "hpn_learner.decoder1"
        - "hpn_learner.decoder2"
        - "hpn_learner.encoder_layer4"
        - "hpn_learner.encoder_layer3"
        - "hpn_learner.encoder_layer2"
        - "student"
    subsample: [1, 2]
    substitutor: [paired]
    iterations_is_num_classes: [false]
    loss:
      - name: refine_distill
        alpha: 1.5
        beta: 1.5
        gamma: 0.5
      - name: refine_distill
        alpha: 2.0
        beta: 2.0
        gamma: 0.5
      
  