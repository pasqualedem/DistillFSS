  #   tracker:
  #     group: [Pascal]
  #     tags: [[Pascal, Baselines]]
  - dataset:
      datasets:
        test_kvasir:
          datapath: [data]
          prompt_images: [5, 10, 25, 50]
    tracker:
      group: [KVASIR]
      tags: [[KVASIR, Baselines]]
  -
    dataset:
      datasets:
        test_isic:
          datapath: [data]
          prompt_images: [9, 15, 30, 60]
    tracker:
      group: [ISIC]
      tags: [[ISIC, Baselines]]
  -
    dataset:
      datasets:
        test_industrial:
          datapath: [data]
          fold: [0]
          prompt_images: [10, 20, 40, 80]
    tracker:
      group: [Industrial]
      tags: [[Industrial, Baselines]]
