grid: INSID3
start_from_grid: 1
parameters:
  device: [cuda:0]
  test:
    prompt_to_use: [null] # How many prompt use in testing - null => all
  dataloader:
    num_workers: [0]
  dataset:
    preprocess:
      mean: [[0.485, 0.456, 0.406]]
      std: [[0.229, 0.224, 0.225]]
      image_size: &image_size [1024]
  tracker:
    project: [FSSWeed]
    group: [KVASIR]
    log_frequency: [1]
    tags: [[KVASIR, Baselines]]
    tmp_dir: [tmp]
    cache_dir: [tmp]
    train_image_log_frequency: [25]
    test_image_log_frequency: [10]
    # mode: [offline]
  model:
    name: [insid3]

other_grids:
