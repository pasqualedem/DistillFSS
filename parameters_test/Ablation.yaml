grid: WeedMapAblation
parameters:
  test:
    prompt_to_use: [null] # How many prompt use in testing - null => all
  dataloader:
    num_workers: [0]
  dataset:
    preprocess:
      mean: [[0.485, 0.456, 0.406]]
      std: [[0.229, 0.224, 0.225]]
      image_size: &image_size [384]
    datasets:
      test_weedmap:
        train_root: [data/weedmap/0_rotations_processed_003_test/RedEdge/000]
        test_root: [data/weedmap/0_rotations_processed_003_test/RedEdge/003]
        prompt_images:
          - 5
          - 10
          - 25
          - 50

        remove_black_images: [false]
  tracker:
    project: [FSSWeed]
    group: [WeedMap]
    log_frequency: [1]
    tags: [[WeedMap]]
    tmp_dir: [tmp]
    cache_dir: [tmp]
    train_image_log_frequency: [25]
    test_image_log_frequency: [10]
  model:
    -
      name: dcama
      backbone: swin
      backbone_checkpoint: checkpoints/swin_base_patch4_window12_384.pth
      model_checkpoint: checkpoints/swin_fold0_pascal_modcross_soft.pt
      concat_support: false
      image_size: 384
      voting: 10
  refinement:
    lr: [1.e-3]
    max_iterations: [1000]
    hot_parameters:
      - 
        - "model.conv1"
        - "model.conv2"
        - "model.conv3"

    subsample: [1]
    substitutor: [paired]
    iterations_is_num_classes: [false]
    loss:
      name: [focal]
      gamma: [2]

other_grids: